# Local development dependencies for Djarvista.
# Usage: docker compose up -d   (then `pnpm db:migrate && pnpm db:seed`)
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: djarvista-postgres
    environment:
      POSTGRES_USER: djarvista
      POSTGRES_PASSWORD: djarvista
      POSTGRES_DB: djarvista
    ports:
      - '5432:5432'
    volumes:
      - djarvista_pg:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U djarvista']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: djarvista-redis
    ports:
      - '6379:6379'
    volumes:
      - djarvista_redis:/data

  minio:
    image: minio/minio:latest
    container_name: djarvista-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: djarvista
      MINIO_ROOT_PASSWORD: djarvista-dev-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - djarvista_minio:/data

  # Optional — enable when moving beyond Postgres full-text search.
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: djarvista-meili
    environment:
      MEILI_MASTER_KEY: djarvista-dev-master-key
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - djarvista_meili:/meili_data
    profiles: ['search']

volumes:
  djarvista_pg:
  djarvista_redis:
  djarvista_minio:
  djarvista_meili:
