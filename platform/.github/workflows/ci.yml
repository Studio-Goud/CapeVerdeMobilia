name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: djarvista
          POSTGRES_PASSWORD: djarvista
          POSTGRES_DB: djarvista
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U djarvista"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://djarvista:djarvista@localhost:5432/djarvista?schema=public
      SHADOW_DATABASE_URL: postgresql://djarvista:djarvista@localhost:5432/djarvista_shadow?schema=public
      AUTH_SECRET: ci-secret-please-change-000000000000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
