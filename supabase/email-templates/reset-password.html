<!-- Djarvista — "Reset Password" email template.
     Paste into Supabase: Authentication → Emails → Templates → Reset Password.
     Subject: Repor a palavra-passe · Reset your password — Djarvista
     NOTE: recovery lands the user on the dashboard with a session; a dedicated
     "set a new password" page can be added later (then change next= to it). -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf8f3;padding:24px 0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
  <tr><td align="center">
    <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="width:480px;max-width:92%;background:#ffffff;border:1px solid #e7dbc7;border-radius:16px;overflow:hidden;">
      <tr><td style="background:#0e6a91;padding:20px 28px;">
        <span style="display:inline-block;width:28px;height:28px;line-height:28px;text-align:center;background:#f2612a;border-radius:8px;color:#ffffff;font-weight:700;vertical-align:middle;">D</span>
        <span style="color:#ffffff;font-size:18px;font-weight:700;letter-spacing:-0.2px;margin-left:8px;vertical-align:middle;">Djarvista</span>
      </td></tr>
      <tr><td style="padding:28px;">
        <h1 style="margin:0 0 6px;font-size:20px;color:#123c52;">Repor a palavra-passe</h1>
        <p style="margin:0 0 16px;font-size:13px;color:#64748b;">Reset your password</p>
        <p style="margin:0 0 22px;font-size:15px;color:#334155;line-height:1.5;">Clique para repor a sua palavra-passe. · Click to reset your password.</p>
        <table role="presentation" cellpadding="0" cellspacing="0"><tr><td style="border-radius:10px;background:#f2612a;">
          <a href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=recovery&next=/pt/painel"
             style="display:inline-block;padding:12px 24px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:10px;">
            Repor · Reset
          </a>
        </td></tr></table>
        <p style="margin:22px 0 0;font-size:12px;color:#94a3b8;line-height:1.5;">Se não pediu isto, ignore este email. · If you didn't request this, ignore this email.</p>
      </td></tr>
      <tr><td style="padding:18px 28px;background:#f3ece0;border-top:1px solid #e7dbc7;">
        <p style="margin:0;font-size:12px;color:#94a3b8;">Djarvista — imóveis, construção e informação oficial em Cabo Verde.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
